<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目初始化 Dashboard</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 
             * Design Tokens System
             * Based on Inter UI & Tailwind-inspired Palette 
             */
            
            /* Core Colors - Indigo & Slate */
            --primary-50: #eef2ff;
            --primary-100: #e0e7ff;
            --primary-500: #6366f1;
            --primary-600: #4f46e5;
            --primary-700: #4338ca;
            
            --secondary-400: #38bdf8;
            --secondary-500: #0ea5e9;
            
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-700: #334155;
            --slate-800: #1e293b;
            --slate-900: #0f172a;

            /* Semantic Mapping */
            --color-primary: var(--primary-600);
            --color-primary-hover: var(--primary-700);
            --color-bg-app: #f0f4f8; /* Soft blue-grey */
            --color-bg-surface: #ffffff;
            --color-text-main: var(--slate-800);
            --color-text-secondary: var(--slate-500);
            --color-text-muted: var(--slate-400);
            --color-border: var(--slate-200);
            
            /* Elevation & Depth */
            --shadow-xs: 0 1px 2px 0 rgba(15, 23, 42, 0.05);
            --shadow-sm: 0 1px 3px 0 rgba(15, 23, 42, 0.08), 0 1px 2px -1px rgba(15, 23, 42, 0.04);
            --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.08), 0 2px 4px -2px rgba(15, 23, 42, 0.04);
            --shadow-lg: 0 10px 15px -3px rgba(15, 23, 42, 0.08), 0 4px 6px -4px rgba(15, 23, 42, 0.04);
            --shadow-inner: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
            --glass-border: 1px solid rgba(255, 255, 255, 0.5);
            
            /* Animation */
            --ease-spring: cubic-bezier(0.4, 0, 0.2, 1);
            --duration: 0.3s;
            
            /* Layout */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--color-bg-app);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(14, 165, 233, 0.03) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--color-text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* zoom: 0.85; Removed for better compatibility */
        }

        /* 
         * Components: Header 
         */
        .app-header {
            height: 48px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
            z-index: 50;
            box-shadow: var(--shadow-sm);
        }

        .app-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary-700);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.02em;
        }
        
        .app-title i {
            font-size: 16px;
            background: linear-gradient(135deg, var(--primary-500), var(--secondary-500));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 
         * Components: Dashboard Layout 
         */
        .dashboard-container {
            flex: 1;
            padding: 12px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 12px;
            overflow: hidden;
            max-width: 1800px;
            margin: 0 auto;
            width: 100%;
            opacity: 0;
            animation: fadeIn 0.6s var(--ease-spring) forwards;
        }
        
        .left-column, .right-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
            overflow: hidden;
        }

        /* 
         * Components: Cards 
         */
        .content-card {
            background: var(--color-bg-surface);
            border-radius: var(--radius-md);
            border: 1px solid var(--slate-200);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        .content-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--primary-100);
        }

        .card-header {
            padding: 12px 20px;
            background: linear-gradient(to right, #ffffff, #fcfcfc);
            border-bottom: 1px solid var(--slate-100);
            font-size: 14px;
            font-weight: 600;
            color: var(--slate-700);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .card-header i {
            color: var(--primary-500);
            background: var(--primary-50);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 12px;
        }

        .card-body {
            padding: 16px;
            flex: 1;
            overflow-y: auto;
        }

        /* 
         * Components: Info Grid 
         */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
            background: var(--slate-50);
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--slate-200);
            transition: all 0.2s ease;
        }
        
        .info-item:hover {
            background: #fff;
            border-color: var(--primary-300);
            box-shadow: var(--shadow-sm);
            transform: translateY(-2px);
        }
        
        .info-item::after {
            content: none; /* Removed the previous underline effect */
        }

        .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-secondary);
            font-weight: 600;
        }

        .value {
            font-size: 15px;
            color: var(--color-text-main);
            font-weight: 500;
            line-height: 1.5;
        }

        .value.highlight {
            color: var(--primary-600);
            font-weight: 700;
            background: var(--primary-50);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        /* 
         * Components: Constraints 
         */
        .constraints-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .scope-text {
            font-size: 13px;
            line-height: 1.6;
            color: var(--slate-600);
            background: var(--slate-50);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--primary-500);
            position: relative;
        }

        .lists-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 4px;
        }

        .list-section h4 {
            font-size: 12px;
            font-weight: 700;
            color: var(--slate-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .simple-list {
            list-style: none;
        }

        .simple-list li {
            font-size: 13px;
            margin-bottom: 8px;
            color: var(--slate-600);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #fff;
            border: 1px solid var(--slate-200);
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
            cursor: default;
        }

        .simple-list li:hover {
            border-color: var(--primary-500);
            background: var(--primary-50);
            transform: translateX(4px);
            box-shadow: var(--shadow-sm);
        }

        .date-badge, .amount-badge {
            font-weight: 600;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 0.02em;
        }
        
        .date-badge {
            color: var(--primary-700);
            background: #eef2ff;
        }
        
        .amount-badge {
            color: #059669;
            background: #ecfdf5;
        }

        /* 
         * Components: Team Table 
         */
        .table-container {
            height: 100%;
            overflow: auto;
        }

        .table-wrapper {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .table-header-fixed {
            flex-shrink: 0;
            background: #fff;
            border-bottom: 1px solid var(--slate-200);
            z-index: 10;
        }

        .table-body-scroll {
            flex: 1;
            overflow-y: auto;
        }

        .team-table {
            width: 100%;
            border-collapse: collapse;
        }

        .team-table th {
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--slate-500);
            padding: 10px 16px;
        }

        .team-table td {
            padding: 10px 16px;
            font-size: 13px;
            color: var(--slate-700);
            border-bottom: 1px solid var(--slate-100);
            transition: background 0.2s;
        }

        .team-table tr:hover td {
            background-color: var(--primary-50);
        }

        .role-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            background: var(--slate-100);
            border: 1px solid var(--slate-200);
            border-radius: 20px;
            font-size: 12px;
            color: var(--slate-600);
            font-weight: 500;
        }
        
        .level-badge {
            display: inline-flex;
            width: 32px;
            height: 32px;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
            color: #fff;
            font-weight: 700;
            font-size: 12px;
            border-radius: 50%;
            box-shadow: 0 2px 4px rgba(99, 102, 241, 0.3);
        }

        /* 
         * Components: Filter Bar 
         */
        .filter-bar {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--slate-200);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }

        .filter-wrapper {
            position: relative;
            flex: 1;
        }

        .filter-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--slate-400);
            font-size: 14px;
            pointer-events: none;
            z-index: 1;
            transition: color 0.3s;
        }

        .filter-arrow {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--slate-400);
            font-size: 12px;
            pointer-events: none;
            transition: transform 0.3s ease, color 0.3s;
        }

        .filter-wrapper:hover .filter-arrow {
            color: var(--primary-500);
            transform: translateY(-50%) rotate(180deg);
        }
        
        .filter-wrapper:hover .filter-icon {
            color: var(--primary-500);
        }

        .filter-select {
            width: 100%;
            padding: 10px 40px;
            border: 1px solid var(--slate-200);
            border-radius: var(--radius-sm);
            background-color: #fff;
            color: var(--slate-700);
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
            appearance: none;
            box-shadow: var(--shadow-xs);
        }

        .filter-select:hover {
            border-color: var(--primary-300);
            box-shadow: 0 0 0 3px var(--primary-50);
        }

        .filter-select:focus {
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px var(--primary-100);
        }

        /* 
         * Components: Pagination 
         */
        .pagination-container {
            padding: 8px 16px;
            border-top: 1px solid var(--slate-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            flex-shrink: 0;
        }

        .pagination-info {
            font-size: 12px;
            color: var(--slate-500);
        }

        .pagination-controls {
            display: flex;
            gap: 8px;
        }

        .page-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--slate-200);
            background: #fff;
            border-radius: 6px;
            color: var(--slate-600);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--primary-500);
            color: var(--primary-500);
            background: var(--primary-50);
        }

        .page-btn.active {
            background: var(--primary-600);
            color: #fff;
            border-color: var(--primary-600);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: var(--slate-50);
        }

        /* 
         * Animations 
         */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 
         * Responsive Design 
         */
        @media (max-width: 1200px) {
            .dashboard-container {
                grid-template-columns: 1fr;
                max-width: 900px;
            }
            .lists-container {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .app-header {
                padding: 0 16px;
                justify-content: space-between; /* Ensure space-between works */
            }
            .dashboard-container {
                padding: 16px;
                gap: 16px;
            }
            .info-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .lang-toggle {
            padding: 6px 16px;
            background: white;
            border: 1px solid var(--slate-200);
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--slate-600);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-xs);
        }
        .lang-toggle:hover {
            background: var(--primary-50);
            color: var(--primary-600);
            border-color: var(--primary-200);
        }
    </style>
</head>
<body>

    <!-- App Header -->
    <header class="app-header">
        <div class="app-title">
            <i class="fas fa-project-diagram"></i>
            <span data-i18n="header_title">项目初始化中心</span>
        </div>
        <button id="lang-toggle" class="lang-toggle">
            <i class="fas fa-globe"></i> <span>CN / EN</span>
        </button>
    </header>

    <!-- Main Dashboard -->
    <div class="dashboard-container">
        
        <!-- Left Column -->
        <div class="left-column">
            
            <!-- Basic Information -->
            <div class="content-card">
                <div class="card-header">
                    <i class="fas fa-info-circle"></i>
                    <span data-i18n="basic_info">基本信息</span>
                </div>
                <div class="card-body">
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="label" data-i18n="project_name">项目名称</div>
                            <div class="value highlight" id="p-name">--</div>
                        </div>
                        <div class="info-item">
                            <div class="label" data-i18n="project_code">项目编号</div>
                            <div class="value highlight" id="p-code">--</div>
                        </div>
                        <div class="info-item">
                            <div class="label" data-i18n="client">客户</div>
                            <div class="value highlight" id="p-client">--</div>
                        </div>
                        <div class="info-item">
                            <div class="label" data-i18n="country">国别</div>
                            <div class="value highlight" id="p-country">--</div>
                        </div>
                        <div class="info-item">
                            <div class="label" data-i18n="contract_date">签约日期</div>
                            <div class="value highlight" id="p-date">--</div>
                        </div>
                        <div class="info-item">
                            <div class="label" data-i18n="project_type">项目类型</div>
                            <div class="value highlight" data-i18n="epc_contract">EPC 总承包</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Constraints -->
            <div class="content-card" style="flex: 1;">
                <div class="card-header">
                    <i class="fas fa-exclamation-circle"></i>
                    <span data-i18n="constraints">前置条件</span>
                </div>
                <div class="card-body">
                    <div class="constraints-grid">
                        <div class="info-item">
                            <div class="label" style="margin-bottom: 8px;" data-i18n="duration">项目工期</div>
                            <div class="value" id="c-date-range" style="font-size: 16px; font-weight: 600;">--</div>
                        </div>

                        <div class="info-item">
                            <div class="label" style="margin-bottom: 8px;" data-i18n="scope">工作范围</div>
                            <div class="scope-text" id="c-scope">
                                --
                            </div>
                        </div>

                        <div class="lists-container">
                            <div class="list-section">
                                <h4 data-i18n="milestones">关键里程碑</h4>
                                <ul class="simple-list" id="c-milestones">
                                    <!-- JS Rendered -->
                                </ul>
                            </div>

                            <div class="list-section">
                                <h4 data-i18n="budget">年度预算</h4>
                                <ul class="simple-list" id="c-budget">
                                    <!-- JS Rendered -->
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Right Column -->
        <div class="right-column">
            
            <!-- Team Configuration -->
            <div class="content-card" style="height: 100%;">
                <div class="card-header">
                    <i class="fas fa-users-cog"></i>
                    <span data-i18n="team_config">权限设置及团队配置</span>
                </div>
                <!-- Filter Bar -->
                <div class="filter-bar">
                    <div class="filter-wrapper">
                        <i class="fas fa-layer-group filter-icon"></i>
                        <select id="filter-level" class="filter-select">
                            <option value="" data-i18n="all_levels">所有级别</option>
                        </select>
                        <i class="fas fa-chevron-down filter-arrow"></i>
                    </div>
                    <div class="filter-wrapper">
                        <i class="fas fa-briefcase filter-icon"></i>
                        <select id="filter-role" class="filter-select">
                            <option value="" data-i18n="all_roles">所有岗位</option>
                        </select>
                        <i class="fas fa-chevron-down filter-arrow"></i>
                    </div>
                </div>
                <div class="card-body" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
                    <div class="table-wrapper">
                        <div class="table-header-fixed">
                            <table class="team-table">
                                <thead>
                                    <tr>
                                        <th style="padding-left: 24px; width: 30%;" data-i18n="level">级别</th>
                                        <th style="width: 30%;" data-i18n="role">岗位</th>
                                        <th style="width: 40%;" data-i18n="name">姓名</th>
                                    </tr>
                                </thead>
                            </table>
                        </div>
                        <div class="table-body-scroll">
                            <table class="team-table">
                                <tbody id="team-tbody">
                                    <!-- JS Rendered -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <!-- Pagination -->
                    <div class="pagination-container" id="pagination">
                        <!-- JS Rendered -->
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        const i18n = {
            'zh': {
                'title': '项目初始化 Dashboard',
                'header_title': '项目初始化中心',
                'basic_info': '基本信息',
                'project_name': '项目名称',
                'project_code': '项目编号',
                'client': '客户',
                'country': '国别',
                'contract_date': '签约日期',
                'project_type': '项目类型',
                'epc_contract': 'EPC 总承包',
                'constraints': '前置条件',
                'duration': '项目工期',
                'scope': '工作范围',
                'milestones': '关键里程碑',
                'budget': '年度预算',
                'team_config': '权限设置及团队配置',
                'all_levels': '所有级别',
                'all_roles': '所有岗位',
                'level': '级别',
                'role': '岗位',
                'name': '姓名',
                'no_match': '未找到匹配的成员',
                'showing': '显示',
                'total': '共',
                'items': '项'
            },
            'en': {
                'title': 'Project Init Dashboard',
                'header_title': 'Project Initialization Center',
                'basic_info': 'Basic Information',
                'project_name': 'Project Name',
                'project_code': 'Project Code',
                'client': 'Client',
                'country': 'Country',
                'contract_date': 'Contract Date',
                'project_type': 'Project Type',
                'epc_contract': 'EPC General Contract',
                'constraints': 'Prerequisites',
                'duration': 'Duration',
                'scope': 'Scope of Work',
                'milestones': 'Key Milestones',
                'budget': 'Annual Budget',
                'team_config': 'Permissions & Team Config',
                'all_levels': 'All Levels',
                'all_roles': 'All Roles',
                'level': 'Level',
                'role': 'Role',
                'name': 'Name',
                'no_match': 'No matching members found',
                'showing': 'Showing',
                'total': 'of',
                'items': 'items'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'zh';

        function updateContent() {
            // Update all elements with data-i18n attribute
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (i18n[currentLang][key]) {
                    element.textContent = i18n[currentLang][key];
                }
            });

            // Update title
            document.title = i18n[currentLang]['title'];

            // Update language toggle button text
            const langText = document.getElementById('lang-text');
            if (langText) {
                langText.textContent = currentLang === 'zh' ? 'English' : '中文';
            }
            
            // Re-render components that contain dynamic text
            renderTeamTable(currentData);
        }

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('lang', currentLang);
            updateContent();
        }

        const projectData = {
            basic: {
                name: '亚太区智慧物流枢纽建设',
                code: 'P-2026-X88',
                client: 'Global Trans Corp.',
                country: '中国 (China)',
                date: '2026-01-15',
                type: 'EPC'
            },
            constraints: {
                start: '2026-03-01',
                end: '2029-02-28',
                scope: '包含城市轨道交通线路的土建工程施工（区间隧道、车站主体及附属结构）、轨道工程铺设、机电系统安装（供电、通信、信号、综合监控）、车辆基地建设，以及全线系统联调、试运行与初期运营技术支持；同步完成相关设计深化、设备采购、施工管理、安全质量控制及竣工验收工作。',
                milestones: [
                    { date: '2026-03', event: '项目启动会' },
                    { date: '2026-08', event: '地基工程验收' },
                    { date: '2027-02', event: '自动化设备进场' },
                    { date: '2027-12', event: '系统上线试运行' },
                    { date: '2028-12', event: '竣工验收' }
                ],
                budget: [
                    { year: '第一年', amount: '12.5 M$' },
                    { year: '第二年', amount: '8.2 M$' },
                    { year: '第三年', amount: '4.5 M$' }
                ]
            },
            team: [
                { level: 'A1', role: '总经理', name: 'Dr. Li Henderson' },
                { level: 'A2', role: '副总经理', name: 'Sarah Chen' },
                { level: 'A3', role: '部长', name: 'Michael Wong' },
                { level: 'A3', role: '部长A', name: 'Xavier' },
                { level: 'A4', role: '工程师', name: 'Rajesh Kumar' },
                { level: 'A4', role: '职员', name: 'Emma Watson' },
                { level: 'A5', role: '联合体', name: 'Zhang Wei' },
                { level: 'A6', role: '顾问', name: 'John Smith' },
                { level: 'A7', role: '分包商', name: 'Zhao Min' },
                { level: 'A7', role: '分包商', name: '分包商A' },
                { level: 'A7', role: '分包商', name: '分包商A' },
                { level: 'A7', role: '分包商', name: '分包商A' },
                { level: 'A7', role: '分包商', name: '分包商A' },
                { level: 'A7', role: '分包商', name: '分包商A' },
                { level: 'A7', role: '分包商', name: '分包商A' },
                { level: 'A7', role: '分包商', name: '分包商A' },
                { level: 'A7', role: '分包商', name: '分包商A' },

                { level: 'A7', role: '分包商', name: '分包商' }
            ]
        };

        function init() {
            // Basic Info
            document.getElementById('p-name').textContent = projectData.basic.name;
            document.getElementById('p-code').textContent = projectData.basic.code;
            document.getElementById('p-client').textContent = projectData.basic.client;
            document.getElementById('p-country').textContent = projectData.basic.country;
            document.getElementById('p-date').textContent = projectData.basic.date;

            // Constraints
            document.getElementById('c-date-range').textContent = `${projectData.constraints.start} 至 ${projectData.constraints.end}`;
            document.getElementById('c-scope').textContent = projectData.constraints.scope;

            document.getElementById('c-milestones').innerHTML = projectData.constraints.milestones.map(m => `
                <li>
                    <span>${m.event}</span>
                    <span class="date-badge">${m.date}</span>
                </li>
            `).join('');

            document.getElementById('c-budget').innerHTML = projectData.constraints.budget.map(b => `
                <li>
                    <span>${b.year}</span>
                    <span class="amount-badge">${b.amount}</span>
                </li>
            `).join('');

            // Team
            initFilters();
            renderTeamTable(projectData.team);
            
            // Language Init
            document.getElementById('lang-toggle').addEventListener('click', toggleLanguage);
            updateContent();
        }

        let currentPage = 1;
        const itemsPerPage = 12; // Increased to 12 to fill empty space
        let currentData = [];

        function renderTeamTable(data) {
            currentData = data;
            const totalPages = Math.ceil(data.length / itemsPerPage);
            
            // Adjust current page if out of bounds
            if (currentPage > totalPages) currentPage = 1;
            
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = data.slice(start, end);

            const tbody = document.getElementById('team-tbody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 20px; color: var(--text-light);">${i18n[currentLang]['no_match']}</td></tr>`;
                renderPagination(0);
                return;
            }
            
            tbody.innerHTML = pageData.map(t => `
                <tr>
                    <td style="padding-left: 24px; width: 30%;">
                        <span class="level-badge">${t.level}</span>
                    </td>
                    <td style="width: 30%;"><span class="role-badge">${t.role}</span></td>
                    <td style="font-weight:600; width: 40%;">${t.name}</td>
                </tr>
            `).join('');

            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.style.display = 'none';
                return;
            }
            container.style.display = 'flex';
            
            const startItem = (currentPage - 1) * itemsPerPage + 1;
            const endItem = Math.min(currentPage * itemsPerPage, currentData.length);

            let controls = `
                <div class="pagination-info">${i18n[currentLang]['showing']} ${startItem}-${endItem} ${i18n[currentLang]['total']} ${currentData.length} ${i18n[currentLang]['items']}</div>
                <div class="pagination-controls">
                    <button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                        <i class="fas fa-chevron-left"></i>
                    </button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                if (
                    i === 1 || 
                    i === totalPages || 
                    (i >= currentPage - 1 && i <= currentPage + 1)
                ) {
                    controls += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
                } else if (
                    i === currentPage - 2 || 
                    i === currentPage + 2
                ) {
                    controls += `<span style="font-size:12px; color:var(--slate-400); align-self:center;">...</span>`;
                }
            }

            controls += `
                    <button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            `;
            
            container.innerHTML = controls;
        }

        function changePage(page) {
            currentPage = page;
            renderTeamTable(currentData);
        }

        function initFilters() {
            const levelSelect = document.getElementById('filter-level');
            const roleSelect = document.getElementById('filter-role');

            // Get unique levels and roles
            const levels = [...new Set(projectData.team.map(t => t.level))].sort();
            const roles = [...new Set(projectData.team.map(t => t.role))].sort();

            // Populate dropdowns
            levels.forEach(l => {
                const option = document.createElement('option');
                option.value = l;
                option.textContent = l;
                levelSelect.appendChild(option);
            });

            roles.forEach(r => {
                const option = document.createElement('option');
                option.value = r;
                option.textContent = r;
                roleSelect.appendChild(option);
            });

            // Add event listeners
            function filterData() {
                const levelVal = levelSelect.value;
                const roleVal = roleSelect.value;

                const filtered = projectData.team.filter(t => {
                    const matchLevel = levelVal === '' || t.level === levelVal;
                    const matchRole = roleVal === '' || t.role === roleVal;
                    return matchLevel && matchRole;
                });
                
                currentPage = 1; // Reset to first page on filter
                renderTeamTable(filtered);
            }

            levelSelect.addEventListener('change', filterData);
            roleSelect.addEventListener('change', filterData);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
