<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分包商登录首页 | 任务管理看板</title>
    <style>
        /* 
         * ==========================================
         * Design System Copied from dashboard.html
         * ==========================================
         */
        :root {
            /* Light Theme */
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --bg-surface-hover: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --border-color: #e2e8f0;
            
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --primary-light: #eef2ff;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);

            /* Button Variables */
            --btn-height: 40px;
            --btn-radius: 8px;
            --btn-padding: 0 16px;
            --btn-gap: 8px;
            --btn-font-size: 14px;
            --btn-font-weight: 500;
            
            --radius-md: 8px;
            --radius-lg: 16px;
            
            --transition-base: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --bg-surface-hover: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-tertiary: #64748b;
            --border-color: #334155;
            
            --primary-color: #6366f1;
            --primary-hover: #818cf8;
            --primary-light: rgba(99, 102, 241, 0.1);
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout */
        .app-container {
            max-width: 1600px; /* Increased for 2-column layout */
            margin: 0 auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px; /* Reduced from 20px */
            min-height: 100vh;
        }

        /* Header Section */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-title h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .header-title p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        /* Buttons & Components */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: var(--btn-height);
            padding: var(--btn-padding);
            border-radius: var(--btn-radius);
            font-size: var(--btn-font-size);
            font-weight: var(--btn-font-weight);
            cursor: pointer;
            transition: var(--transition-base);
            border: 1px solid transparent;
            gap: var(--btn-gap);
            line-height: 1;
        }

        .btn-outline {
            background-color: transparent;
            border-color: var(--border-color);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background-color: var(--bg-surface-hover);
        }

        /* Unified Header Buttons */
        .header-actions .btn, 
        .header-actions .clock-display {
             height: var(--btn-height);
             border-radius: var(--btn-radius);
             box-shadow: var(--shadow-sm);
        }

        .clock-display {
            font-family: 'SF Pro Display', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            padding: 0 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--btn-radius);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
        }

        .theme-toggle {
            width: var(--btn-height); /* Square button for icon */
            height: var(--btn-height);
            padding: 0; /* Override default padding */
            border-radius: var(--btn-radius); /* Unify radius */
        }
        
        /* Language Switcher Styling */
        .lang-switcher {
            appearance: none;
            -webkit-appearance: none;
            background-color: transparent;
            padding-right: 28px; /* Space for arrow */
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 8px center;
            background-repeat: no-repeat;
            background-size: 16px;
            min-width: 90px;
            line-height: 1.5;
            padding-top: 0;
            padding-bottom: 0;
        }

        /* Top Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 12px; /* Reduced from 16px */
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: var(--transition-base);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px; /* Reduced from 8px */
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .stat-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background-color: var(--primary-light);
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-value.urgent { color: #ef4444; }

        .stat-trend {
            font-size: 12px;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .trend-up { color: #10b981; }
        .trend-neutral { color: var(--text-secondary); }

        /* Tasks Grid Layout (2x2) */
        .tasks-grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 12px; /* Reduced from 20px */
        }
        
        @media (max-width: 1200px) {
            .tasks-grid-layout {
                grid-template-columns: 1fr;
            }
        }

        .task-section {
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .section-icon {
            width: 20px;
            height: 20px;
            stroke-width: 2.5;
        }

        /* 
        .section-title::before {
            content: '#';
            color: var(--text-tertiary);
            font-weight: 400;
            
        }
        */

        .title-overdue { color: #ef4444; }
        .title-weekly { color: #ea580c; } /* Orange */
        .title-monthly { color: #000000; }
        .title-quarterly { color: #000000; }

        /* Row Blinking Animation */
        @keyframes rowBlink {
            0%, 100% { opacity: 1; background-color: rgba(220, 53, 69, 0.15); }
            50% { opacity: 0.8; background-color: rgba(220, 53, 69, 0.35); }
        }

        .row-blink {
            animation: rowBlink 2s infinite ease-in-out;
        }
        
        /* Ensure text remains readable during blink */
        .row-blink td {
            transition: color 0.3s;
        }


        /* Table Styles */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 600px;
        }

        th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 12px;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 13px;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: var(--bg-surface-hover); }

        /* Badges & Avatars */
        .status-badge {
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 500;
            display: inline-block;
        }
        .badge-design { background: #e0e7ff; color: #4338ca; }
        .badge-dev { background: #dbeafe; color: #1e40af; }
        .badge-ops { background: #fce7f3; color: #9d174d; }

        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            margin-right: 6px;
        }
        
        .user-row {
            display: flex;
            align-items: center;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: auto;
            padding-top: 12px;
        }
        .page-dot {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .page-dot.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .blink-anim {
            animation: blink 1s infinite ease-in-out;
            cursor: pointer;
        }

        .blink-anim:hover {
            animation-play-state: paused;
        }

        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        
        /* Compact Adjustments */
        td, th {
            padding: 8px 12px; /* Reduced padding */
        }
        
        .task-section {
            padding: 16px; /* Reduced padding */
            gap: 12px;
        }
        
        .section-title {
            margin-bottom: 4px;
        }
        
        .pagination {
            padding-top: 8px;
        }

        /* Pagination Buttons */
        .page-btn {
            padding: 4px 10px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-surface);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 12px;
            color: var(--text-primary);
            transition: var(--transition-base);
        }

        .page-btn:hover:not(:disabled) {
            background-color: var(--bg-surface-hover);
            border-color: var(--primary-color);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .text-red { color: #dc3545 !important; }
        .text-black { color: #000000 !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header class="animate-in">
            <div class="header-title">
                <h1 data-i18n="subcontractor_title">分包商登录首页</h1>
                <p data-i18n="welcome_message">欢迎回来，查看您的今日概览</p>
            </div>
            <div class="header-actions">
                <div id="clock" class="clock-display"></div>
                <button class="btn btn-outline" id="theme-toggle" title="切换主题" data-i18n="switch_theme">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Top Stats -->
        <section class="stats-grid animate-in delay-1">
            <div class="card">
                <div class="stat-header">
                    <div class="stat-label" data-i18n="task_messages">任务消息</div>
                    <div class="stat-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    </div>
                </div>
                <div class="stat-value urgent">12</div>
                <div class="stat-trend trend-up"><span>较昨日 +2</span></div>
            </div>

            <div class="card">
                <div class="stat-header">
                    <div class="stat-label" data-i18n="pending_emails">待处理邮件</div>
                    <div class="stat-icon" style="background-color: #fff7ed; color: #ea580c;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    </div>
                </div>
                <div class="stat-value urgent">5</div>
                <div class="stat-trend trend-neutral"><span>保持平稳</span></div>
            </div>

            <div class="card">
                <div class="stat-header">
                    <div class="stat-label" data-i18n="work_report_rate">报工率</div>
                    <div class="stat-icon" style="background-color: #f0fdf4; color: #16a34a;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                    </div>
                </div>
                <div class="stat-value">98%</div>
                <div class="stat-trend trend-up"><span>工时正常</span></div>
            </div>
        </section>

        <!-- Main Grid Layout -->
        <div class="tasks-grid-layout animate-in delay-2">
            
            <!-- 1. Overdue Tasks -->
            <div class="task-section">
                <h2 class="section-title title-overdue">
                    <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <span data-i18n="overdue_tasks">逾期任务</span>
                </h2>
                <div class="table-wrapper">
                    <table id="table-overdue">
                        <thead>
                            <tr>
                                <th width="50">#</th>
                                <th data-i18n="task_name">任务名称</th>
                                <th data-i18n="source">来源</th>
                                <th data-i18n="deadline">截止时间</th>
                                <th data-i18n="upstream">上游方</th>
                                <th data-i18n="downstream">下游方</th>
                                <th data-i18n="owner">负责人</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination-overdue"></div>
            </div>

            <!-- 2. Weekly Tasks -->
            <div class="task-section">
                <h2 class="section-title title-weekly">
                    <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span data-i18n="weekly_tasks">本周任务</span>
                </h2>
                <div class="table-wrapper">
                    <table id="table-weekly">
                        <thead>
                            <tr>
                                <th width="50">#</th>
                                <th data-i18n="task_name">任务名称</th>
                                <th data-i18n="source">来源</th>
                                <th data-i18n="deadline">截止时间</th>
                                <th data-i18n="upstream">上游方</th>
                                <th data-i18n="downstream">下游方</th>
                                <th data-i18n="owner">负责人</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination-weekly"></div>
            </div>

            <!-- 3. Monthly Tasks -->
            <div class="task-section">
                <h2 class="section-title title-monthly">
                    <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                        <path d="M8 14h.01"></path>
                        <path d="M12 14h.01"></path>
                        <path d="M16 14h.01"></path>
                        <path d="M8 18h.01"></path>
                        <path d="M12 18h.01"></path>
                        <path d="M16 18h.01"></path>
                    </svg>
                    <span data-i18n="monthly_tasks">本月任务</span>
                </h2>
                <div class="table-wrapper">
                    <table id="table-monthly">
                        <thead>
                            <tr>
                                <th width="50">#</th>
                                <th data-i18n="task_name">任务名称</th>
                                <th data-i18n="source">来源</th>
                                <th data-i18n="deadline">截止时间</th>
                                <th data-i18n="upstream">上游方</th>
                                <th data-i18n="downstream">下游方</th>
                                <th data-i18n="owner">负责人</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination-monthly"></div>
            </div>

            <!-- 4. Quarterly Tasks -->
            <div class="task-section">
                <h2 class="section-title title-quarterly">
                    <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>

                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span data-i18n="quarterly_tasks">季度任务</span>
                </h2>
                <div class="table-wrapper">
                    <table id="table-quarterly">
                        <thead>
                            <tr>
                                <th width="50">#</th>
                                <th data-i18n="task_name">任务名称</th>
                                <th data-i18n="source">来源</th>
                                <th data-i18n="deadline">截止时间</th>
                                <th data-i18n="upstream">上游方</th>
                                <th data-i18n="downstream">下游方</th>
                                <th data-i18n="owner">负责人</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination-quarterly"></div>
            </div>

            <!-- 5. Downstream Monitor -->
            <div class="task-section" style="grid-column: 1 / -1;">
                <h2 class="section-title">
                    <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                    </svg>
                    <span data-i18n="downstream_monitor">下游状态监控</span>
                </h2>
                <div class="table-wrapper">
                    <table id="table-monitor">
                        <thead>
                            <tr>
                                <th width="50">#</th>
                                <th data-i18n="system_name">系统名称</th>
                                <th data-i18n="status">状态</th>
                                <th data-i18n="response_time">响应时间</th>
                                <th data-i18n="availability">可用性</th>
                                <th data-i18n="last_check">最近检查</th>
                                <th data-i18n="owner">负责人</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination-monitor"></div>
            </div>


        </div>
    </div>

    <script>
        // Clock
        function updateClock() {
            const now = new Date();
            const timeString = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            document.getElementById('clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Theme Toggle
        const themeBtn = document.getElementById('theme-toggle');
        const root = document.documentElement;
        themeBtn.addEventListener('click', () => {
            const newTheme = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', newTheme);
        });

        // Blinking Logic
        const urgentStats = document.querySelectorAll('.stat-value.urgent');
        urgentStats.forEach(stat => {
            stat.classList.add('blink-anim');
            stat.title = "点击标记为已读/停止闪烁";
            stat.addEventListener('click', function() {
                this.classList.remove('blink-anim');
                this.style.cursor = 'default';
                this.title = "";
            });
        });

        // Mock Data Generator
        const generateData = (count, startId) => {
            const sources = [
                { name: '产品部', type: 'design', color: '#e0e7ff' },
                { name: '技术部', type: 'dev', color: '#dbeafe' },
                { name: '运维部', type: 'ops', color: '#fce7f3' },
                { name: '测试部', type: 'design', color: '#e0e7ff' }
            ];
            const people = [
                { name: '张三', color: '#6366f1' },
                { name: '李四', color: '#8b5cf6' },
                { name: '王五', color: '#f59e0b' },
                { name: '赵六', color: '#ec4899' },
                { name: '钱七', color: '#10b981' }
            ];
            
            return Array.from({ length: count }, (_, i) => {
                const src = sources[Math.floor(Math.random() * sources.length)];
                const person = people[Math.floor(Math.random() * people.length)];
                return {
                    id: String(startId + i).padStart(2, '0'),
                    title: ['完成界面设计初稿', '后端API接口开发', '数据库优化', '用户验收测试', '移动端适配', '日志系统升级', '第三方支付集成'][i % 7],
                    desc: ['UI/UX Design', 'Backend Dev', 'Database', 'QA Testing', 'Responsive', 'Infrastructure', 'Payment'][i % 7],
                    source: src.name,
                    sourceType: `badge-${src.type}`,
                    date: '2023-10-2' + (i % 9),
                    upstream: ['产品部', '架构师', 'DBA', '开发组', 'UI组'][i % 5],
                    downstream: ['前端组', '后端组', '运维组', '客户', '测试组'][i % 5],
                    owner: person.name,
                    avatarColor: person.color
                };
            });
        };

        // Data Sets (Increased count for pagination demo)
        const dataSets = {
            'overdue': generateData(12, 1),
            'weekly': generateData(18, 13),
            'monthly': generateData(25, 31),
            'quarterly': generateData(8, 56)
        };

        // Pagination State
        const tableState = {
            'overdue': { page: 1, limit: 3 },
            'weekly': { page: 1, limit: 3 },
            'monthly': { page: 1, limit: 3 },
            'quarterly': { page: 1, limit: 3 },
            'monitor': { page: 1, limit: 3 }
        };

        // Render Function
        function renderTable(type) {
            const tbody = document.querySelector(`#table-${type} tbody`);
            const data = dataSets[type];
            const state = tableState[type];
            
            // Calculate Pagination
            const totalPages = Math.ceil(data.length / state.limit);
            const start = (state.page - 1) * state.limit;
            const end = start + state.limit;
            const pageData = data.slice(start, end);

            // Determine text color class
            const textClass = type === 'overdue' ? 'text-red' : 'text-black';
            
            // Determine row animation class
            const rowClass = type === 'overdue' ? 'row-blink' : '';

            tbody.innerHTML = pageData.map(item => `
                <tr class="${rowClass}">
                    <td style="color: var(--text-tertiary)">${item.id}</td>
                    <td>
                        <div style="font-weight: 500;" class="${textClass}">${item.title}</div>
                        <div style="font-size: 11px; color: var(--text-secondary)">${item.desc}</div>
                    </td>
                    <td><span class="status-badge ${item.sourceType}">${item.source}</span></td>
                    <td class="${textClass}">${item.date}</td>
                    <td>${item.upstream}</td>
                    <td style="color: var(--text-tertiary)">${item.downstream}</td>
                    <td>
                        <div class="user-row">
                            <div class="user-avatar" style="background-color: ${item.avatarColor}">${item.owner[0]}</div>
                            <span>${item.owner}</span>
                        </div>
                    </td>
                </tr>
            `).join('');

            renderPagination(type, totalPages);
        }

        function renderPagination(type, totalPages) {
            const container = document.getElementById(`pagination-${type}`);
            const state = tableState[type];
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            
            // Prev Button
            html += `<button class="page-btn" onclick="changePage('${type}', ${state.page - 1})" ${state.page === 1 ? 'disabled' : ''}>上一页</button>`;
            
            // Page Numbers
            // Simple logic: show all if <= 5, otherwise show simplified range (here simplified to show all for demo, or max 5)
            const maxVisible = 5;
            let startPage = Math.max(1, state.page - 2);
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            
            if (endPage - startPage < maxVisible - 1) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${state.page === i ? 'active' : ''}" onclick="changePage('${type}', ${i})">${i}</button>`;
            }

            // Next Button
            html += `<button class="page-btn" onclick="changePage('${type}', ${state.page + 1})" ${state.page === totalPages ? 'disabled' : ''}>${window.i18nManager ? window.i18nManager.getText('next_page') : '下一页'}</button>`;
            
            // Info
            html += `<span style="font-size: 12px; color: var(--text-tertiary); margin-left: 8px; display: flex; align-items: center;">${state.page} / ${totalPages}</span>`;

            container.innerHTML = html;
        }

        function changePage(type, newPage) {
            const state = tableState[type];
            let data;
            
            if (type === 'monitor') {
                data = monitorData;
            } else {
                data = dataSets[type];
            }
            
            const totalPages = Math.ceil(data.length / state.limit);

            if (newPage >= 1 && newPage <= totalPages) {
                state.page = newPage;
                if (type === 'monitor') {
                    renderMonitorTable();
                } else {
                    renderTable(type);
                }
            }
        }

        // Monitor Data & Render
        const monitorData = [
            { id: '01', name: '支付网关', status: 'normal', latency: '45ms', uptime: '99.99%', lastCheck: '10:00:00', owner: '张三' },
            { id: '02', name: '用户中心', status: 'normal', latency: '28ms', uptime: '99.95%', lastCheck: '10:00:05', owner: '李四' },
            { id: '03', name: '物流系统', status: 'warning', latency: '1200ms', uptime: '98.50%', lastCheck: '09:58:12', owner: '王五' },
            { id: '04', name: '短信服务', status: 'error', latency: 'Timeout', uptime: '95.00%', lastCheck: '09:55:30', owner: '赵六' },
            { id: '05', name: '数据仓库', status: 'normal', latency: '150ms', uptime: '99.90%', lastCheck: '09:00:00', owner: '钱七' }
        ];

        function renderMonitorTable() {
            const tbody = document.querySelector('#table-monitor tbody');
            const state = tableState['monitor'];
            
            const totalPages = Math.ceil(monitorData.length / state.limit);
            const start = (state.page - 1) * state.limit;
            const end = start + state.limit;
            const pageData = monitorData.slice(start, end);

            tbody.innerHTML = pageData.map(item => {
                let statusColor = '#10b981'; // green
                let statusText = window.i18nManager ? window.i18nManager.getText('status_normal') : '正常';
                if (item.status === 'warning') { 
                    statusColor = '#f59e0b'; 
                    statusText = window.i18nManager ? window.i18nManager.getText('status_warning') : '警告'; 
                }
                if (item.status === 'error') { 
                    statusColor = '#ef4444'; 
                    statusText = window.i18nManager ? window.i18nManager.getText('status_error') : '异常'; 
                }
                
                return `
                <tr>
                    <td style="color: var(--text-tertiary)">${item.id}</td>
                    <td><div style="font-weight: 500;">${item.name}</div></td>
                    <td><span class="status-badge" style="background-color: ${statusColor}20; color: ${statusColor}">${statusText}</span></td>
                    <td style="${item.status === 'warning' ? 'color: #f59e0b' : ''}">${item.latency}</td>
                    <td>${item.uptime}</td>
                    <td style="color: var(--text-tertiary)">${item.lastCheck}</td>
                    <td>
                        <div class="user-row">
                            <div class="user-avatar" style="background-color: var(--primary-color)">${item.owner[0]}</div>
                            <span>${item.owner}</span>
                        </div>
                    </td>
                </tr>
                `;
            }).join('');

            renderPagination('monitor', totalPages);
        }

        renderMonitorTable();

        // Init
        ['overdue', 'weekly', 'monthly', 'quarterly'].forEach(renderTable);

    </script>
    <script src="i18n.js"></script>
</body>
</html>
