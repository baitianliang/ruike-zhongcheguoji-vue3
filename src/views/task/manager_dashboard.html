<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部门经理登录首页 | 任务管理看板</title>
    <style>
        /* 
         * ==========================================
         * Design System & Design Decisions
         * ==========================================
         * 
         * 1. Color Palette (颜色系统):
         *    - Primary: #6366f1 (Indigo) - 用于主要操作和强调
         *    - Neutral: Slate scale - 用于文本和背景，提供高级感
         *    - Surface: White/Dark Gray - 用于卡片背景
         *    - Semantic: Green/Blue/Amber - 用于状态指示
         * 
         * 2. Typography (字体系统):
         *    - Family: System UI stack (Inter, SF Pro, Segoe UI)
         *    - Scale: 12px, 14px, 16px, 18px, 24px, 32px
         * 
         * 3. Spacing & Layout (间距与布局):
         *    - Base unit: 4px
         *    - Grid: 8px, 16px, 24px, 32px
         *    - Border Radius: 12px (Modern & Friendly)
         * 
         * 4. Elevation & Depth (阴影与深度):
         *    - Subtle shadows for depth
         *    - Layered z-index for floating elements
         */

        :root {
            /* Light Theme */
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --bg-surface-hover: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --border-color: #e2e8f0;
            
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --primary-light: #eef2ff;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            
            /* Button Variables */
            --btn-height: 40px;
            --btn-radius: 8px;
            --btn-padding: 0 16px;
            --btn-gap: 8px;
            --btn-font-size: 14px;
            --btn-font-weight: 500;
            
            --radius-md: 8px;
            --radius-lg: 16px;
            
            --transition-base: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --bg-surface-hover: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-tertiary: #64748b;
            --border-color: #334155;
            
            --primary-color: #6366f1;
            --primary-hover: #818cf8;
            --primary-light: rgba(99, 102, 241, 0.1);
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.3);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 100vh;
        }

        /* Header Section */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-title h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .header-title p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        /* Components: Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: var(--btn-height);
            padding: var(--btn-padding);
            border-radius: var(--btn-radius);
            font-size: var(--btn-font-size);
            font-weight: var(--btn-font-weight);
            cursor: pointer;
            transition: var(--transition-base);
            border: 1px solid transparent;
            gap: var(--btn-gap);
            line-height: 1;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-outline {
            background-color: transparent;
            border-color: var(--border-color);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background-color: var(--bg-surface-hover);
            border-color: var(--text-secondary);
        }

        /* Unified Header Buttons */
        .header-actions .btn, 
        .header-actions .clock-display {
             height: var(--btn-height);
             border-radius: var(--btn-radius);
             box-shadow: var(--shadow-sm);
        }

        .theme-toggle {
            width: var(--btn-height); /* Square button for icon */
            height: var(--btn-height);
            padding: 0; /* Override default padding */
            border-radius: var(--btn-radius); /* Unify radius */
        }
        
        /* Language Switcher Styling */
        .lang-switcher {
            appearance: none;
            -webkit-appearance: none;
            background-color: transparent;
            padding-right: 28px;
            padding-left: 12px;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 8px center;
            background-repeat: no-repeat;
            background-size: 16px;
            text-align: left;
            min-width: 90px;
            line-height: 1.5;
            padding-top: 0;
            padding-bottom: 0;
        }

        /* Top Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: var(--transition-base);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .stat-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background-color: var(--primary-light);
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-trend {
            font-size: 12px;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .trend-up { color: #10b981; }
        .trend-neutral { color: var(--text-secondary); }

        /* Main Content Grid */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Task Table Section */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .table-container {
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: var(--bg-body);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 14px;
            transition: background-color 0.1s;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: var(--bg-surface-hover);
        }

        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            margin-right: 8px;
        }

        .user-cell {
            display: flex;
            align-items: center;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-badge.design { background-color: #e0e7ff; color: #4338ca; }
        .status-badge.dev { background-color: #dbeafe; color: #1e40af; }
        .status-badge.ops { background-color: #fce7f3; color: #9d174d; }

        /* Metrics Sidebar */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
        }

        .metric-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            transition: var(--transition-base);
        }

        .metric-item:hover {
            transform: translateX(4px);
            border-color: var(--primary-color);
        }

        .metric-info h4 {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .metric-info .val {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .metric-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-green { background-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        .status-blue { background-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .status-orange { background-color: #f59e0b; box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1); }
        .status-gray { background-color: #94a3b8; }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        /* Blink Animation */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .blink-anim {
            animation: blink 2s infinite ease-in-out;
        }

        /* Urgent Style - Text Blink Only */
        .stat-value.urgent {
            color: #ef4444; /* Red Text */
            animation: blink 1s infinite ease-in-out;
        }

        /* Clock Style */
        .clock-display {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            /* margin-right removed for unified gap */
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--bg-surface) 0%, var(--bg-background) 100%);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            box-shadow: var(--shadow-sm), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
            transition: var(--transition-base);
        }
        
        .clock-display:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        /* Search Bar Style */
        .search-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }

        .search-input {
            width: 0;
            padding: 0;
            border: none;
            outline: none;
            background: transparent;
            transition: width 0.3s ease, padding 0.3s ease;
            font-size: 14px;
            color: var(--text-primary);
            opacity: 0;
        }

        .search-wrapper.active .search-input {
            width: 200px;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--bg-surface);
            opacity: 1;
        }

        .search-close {
            display: none;
            cursor: pointer;
            color: var(--text-tertiary);
        }

        .search-wrapper.active .search-close {
            display: block;
        }

        /* Compact Table Style */
        .table-container table td {
            padding: 10px 16px; /* Reduced from default */
        }
        
        .table-container table th {
             padding: 10px 16px;
        }

        /* Pagination Style */
        .pagination-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 16px;
            padding-bottom: 16px;
            gap: 8px;
        }

        .page-btn {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-surface);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
            transition: var(--transition-base);
        }

        .page-btn:hover:not(:disabled) {
            background-color: var(--bg-background);
            border-color: var(--primary-color);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .content-card {
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .content-card .section-header {
            padding: 20px 24px;
            margin-bottom: 0;
            border-bottom: 1px solid var(--border-color);
        }

        .content-card .table-container {
            border: none;
            box-shadow: none;
            border-radius: 0;
            background-color: transparent;
        }

        .split-section {
            display: flex;
            gap: 20px;
        }

        .split-module {
            flex: 1;
            background-color: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
        }
        
        .simple-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .simple-table th {
            text-align: left;
            padding: 12px 8px;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }
        
        .simple-table td {
            padding: 12px 8px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-primary);
        }
        
        .simple-table tr:last-child td {
            border-bottom: none;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header class="animate-in">
            <div class="header-title">
                <h1 data-i18n="manager_title">部门经理登录首页</h1>
                <p data-i18n="welcome_message">欢迎回来，查看您的今日概览</p>
            </div>
            <div class="header-actions">
                <div id="clock" class="clock-display"></div>
                <div id="lang-switcher-container" style="display: contents;">
                    <select id="lang-switcher" class="btn btn-outline lang-switcher" style="cursor: pointer;">
                        <option value="zh">中文</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <button class="btn btn-outline" id="theme-toggle" title="切换主题" data-i18n="switch_theme">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Top Stats -->
        <section class="stats-grid animate-in delay-1">
            <div class="card">
                <div class="stat-header">
                    <div class="stat-label" data-i18n="task_messages">任务消息</div>
                    <div class="stat-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </div>
                </div>
                <div class="stat-value urgent">12</div>
                <div class="stat-trend trend-up">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                        <polyline points="17 6 23 6 23 12"></polyline>
                    </svg>
                    <span>较昨日 +2</span>
                </div>
            </div>

            <div class="card">
                <div class="stat-header">
                    <div class="stat-label" data-i18n="pending_emails">待处理邮件</div>
                    <div class="stat-icon" style="background-color: #fff7ed; color: #ea580c;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                </div>
                <div class="stat-value urgent">5</div>
                <div class="stat-trend trend-neutral">
                    <span>保持平稳</span>
                </div>
            </div>

            <div class="card">
                <div class="stat-header">
                    <div class="stat-label" data-i18n="project_health">项目健康度</div>
                    <div class="stat-icon" style="background-color: #f0fdf4; color: #16a34a;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                        </svg>
                    </div>
                </div>
                <div class="stat-value">98%</div>
                <div class="stat-trend trend-up">
                    <span data-i18n="status_excellent">状态极佳</span>
                </div>
            </div>
        </section>

        <div class="main-content animate-in delay-2">
            <!-- Task List -->
            <section class="content-card">
                <div class="section-header">
                    <h2 class="section-title" data-i18n="team_performance">团队成员表现</h2>
                    <div class="search-wrapper" id="search-wrapper">
                        <input type="text" class="search-input" id="search-input" placeholder="搜索姓名、级别..." data-i18n="search_placeholder_manager">
                        <svg class="search-close" id="search-close" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                        <button class="btn btn-outline" id="search-toggle" style="font-size: 12px; padding: 4px 12px; display: flex; align-items: center; gap: 4px;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <span data-i18n="search">搜索</span>
                        </button>
                    </div>
                </div>
                <div class="table-container">
                    <table style="table-layout: fixed; width: 100%;">
                        <thead>
                            <tr>
                                <th data-i18n="name">姓名</th>
                                <th data-i18n="level">级别</th>
                                <th data-i18n="weekly_task_count">本周任务数</th>
                                <th data-i18n="completed">完成</th>
                                <th data-i18n="delayed">延误</th>
                            </tr>
                        </thead>
                        <tbody id="task-table-body">
                            <!-- Rows will be populated by JS -->
                        </tbody>
                    </table>
                    <div class="pagination-controls" id="pagination-controls">
                        <!-- Pagination buttons will be generated by JS -->
                    </div>
                </div>
            </section>

            <!-- Upstream & Downstream Performance -->
            <div class="split-section">
                <section class="split-module">
                    <div class="section-header">
                        <h2 class="section-title" data-i18n="upstream_performance">上游表现</h2>
                    </div>
                    <table class="simple-table">
                        <thead>
                            <tr>
                                <th data-i18n="unit_name">单位名</th>
                                <th data-i18n="weekly_task_count">本周任务数</th>
                                <th data-i18n="completed_count">完成数</th>
                                <th data-i18n="completion_rate">完成级</th>
                            </tr>
                        </thead>
                        <tbody id="upstream-table-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </section>
                <section class="split-module">
                    <div class="section-header">
                        <h2 class="section-title" data-i18n="downstream_performance">下游表现</h2>
                    </div>
                    <table class="simple-table">
                        <thead>
                            <tr>
                                <th data-i18n="unit_name">单位名</th>
                                <th data-i18n="weekly_task_count">本周任务数</th>
                                <th data-i18n="completed_count">完成数</th>
                                <th data-i18n="completion_rate">完成级</th>
                            </tr>
                        </thead>
                        <tbody id="downstream-table-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </section>
            </div>
        </div>
    </div>

    <script>
        // Clock Logic
        function updateClock() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            // Format: YYYY-MM-DD HH:mm
            const timeString = `${year}-${month}-${day} ${hours}:${minutes}`;
            document.getElementById('clock').textContent = timeString;
        }

        setInterval(updateClock, 1000);
        updateClock();

        // Translation Maps
        const roleMap = {
            '高级设计师': 'role_senior_designer',
            '后端专家': 'role_backend_expert',
            '数据库管理员': 'role_dba',
            'QA工程师': 'role_qa',
            '前端工程师': 'role_frontend',
            'DevOps': 'role_devops',
            '支付专家': 'role_payment',
            '安全顾问': 'role_security',
            '技术文档': 'role_tech_writer',
            '系统架构': 'role_architect'
        };

        const unitMap = {
            '产品部': 'unit_product',
            '设计组': 'unit_design',
            '架构组': 'unit_arch',
            '测试组': 'unit_test',
            '运维组': 'unit_ops',
            '客户方': 'unit_client'
        };

        function getTrans(key, defaultText) {
            return window.i18nManager ? window.i18nManager.getText(key) : defaultText;
        }

        // Team Data
        const teamMembers = [
            { id: 1, name: '张三', level: '高级设计师', tasksCount: 12, completed: 10, delayed: 2, avatar: '张', color: '#6366f1' },
            { id: 2, name: '李四', level: '后端专家', tasksCount: 15, completed: 15, delayed: 0, avatar: '李', color: '#8b5cf6' },
            { id: 3, name: '王五', level: '数据库管理员', tasksCount: 8, completed: 7, delayed: 1, avatar: '王', color: '#f59e0b' },
            { id: 4, name: '赵六', level: 'QA工程师', tasksCount: 20, completed: 18, delayed: 2, avatar: '赵', color: '#ec4899' },
            { id: 5, name: '钱七', level: '前端工程师', tasksCount: 10, completed: 10, delayed: 0, avatar: '钱', color: '#10b981' },
            { id: 6, name: '孙八', level: 'DevOps', tasksCount: 5, completed: 4, delayed: 1, avatar: '孙', color: '#3b82f6' },
            { id: 7, name: '周九', level: '支付专家', tasksCount: 7, completed: 7, delayed: 0, avatar: '周', color: '#6366f1' },
            { id: 8, name: '吴十', level: '安全顾问', tasksCount: 3, completed: 1, delayed: 2, avatar: '吴', color: '#ef4444' },
            { id: 9, name: '郑十一', level: '技术文档', tasksCount: 6, completed: 6, delayed: 0, avatar: '郑', color: '#8b5cf6' },
            { id: 10, name: '王十二', level: '系统架构', tasksCount: 4, completed: 3, delayed: 1, avatar: '王', color: '#f59e0b' }
        ];

        // Upstream & Downstream Data
        const upstreamData = [
            { id: 1, unitName: '产品部', tasksCount: 8, completedCount: 7, completionRate: '90%' },
            { id: 2, unitName: '设计组', tasksCount: 12, completedCount: 10, completionRate: '85%' },
            { id: 3, unitName: '架构组', tasksCount: 5, completedCount: 5, completionRate: '100%' }
        ];

        const downstreamData = [
            { id: 1, unitName: '测试组', tasksCount: 15, completedCount: 12, completionRate: '80%' },
            { id: 2, unitName: '运维组', tasksCount: 10, completedCount: 9, completionRate: '95%' },
            { id: 3, unitName: '客户方', tasksCount: 3, completedCount: 1, completionRate: '60%' }
        ];

        // Pagination State
        const ITEMS_PER_PAGE = 5;
        let currentPage = 1;
        let filteredMembers = [...teamMembers];

        // Render Functions
        function renderTable() {
            const tbody = document.getElementById('task-table-body');
            tbody.innerHTML = '';

            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const pageData = filteredMembers.slice(start, end);

            pageData.forEach(member => {
                const roleKey = roleMap[member.level] || member.level;
                const translatedLevel = getTrans(roleKey, member.level);
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <div class="user-cell">
                            <div class="user-avatar" style="${member.color ? 'background-color: ' + member.color : ''}">${member.avatar}</div>
                            <span style="font-weight: 500;">${member.name}</span>
                        </div>
                    </td>
                    <td><span class="status-badge" style="background-color: #f1f5f9; color: var(--text-secondary);">${translatedLevel}</span></td>
                    <td style="font-weight: 600;">${member.tasksCount}</td>
                    <td style="color: #10b981;">${member.completed}</td>
                    <td style="${member.delayed > 0 ? 'color: #ef4444; font-weight: 600;' : 'color: var(--text-tertiary);'}">${member.delayed}</td>
                `;
                tbody.appendChild(row);
            });

            renderPagination();
        }

        function renderPagination() {
            const container = document.getElementById('pagination-controls');
            container.innerHTML = '';
            
            const totalPages = Math.ceil(filteredMembers.length / ITEMS_PER_PAGE);
            
            if (totalPages <= 1) return;

            // Prev Button
            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.textContent = window.i18nManager ? window.i18nManager.getText('prev_page') : '上一页';
            prevBtn.setAttribute('data-i18n', 'prev_page');
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderTable();
                }
            };
            container.appendChild(prevBtn);

            // Page Numbers
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn ${currentPage === i ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.onclick = () => {
                    currentPage = i;
                    renderTable();
                };
                container.appendChild(pageBtn);
            }

            // Next Button
            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.textContent = window.i18nManager ? window.i18nManager.getText('next_page') : '下一页';
            nextBtn.setAttribute('data-i18n', 'next_page');
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable();
                }
            };
            container.appendChild(nextBtn);
        }

        function renderUpstreamTable() {
            const tbody = document.getElementById('upstream-table-body');
            tbody.innerHTML = '';
            upstreamData.forEach(item => {
                const unitKey = unitMap[item.unitName] || item.unitName;
                const translatedUnit = getTrans(unitKey, item.unitName);

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${translatedUnit}</td>
                    <td>${item.tasksCount}</td>
                    <td>${item.completedCount}</td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div style="flex: 1; height: 6px; background: #e2e8f0; border-radius: 3px; width: 60px;">
                                <div style="width: ${item.completionRate}; height: 100%; background: #6366f1; border-radius: 3px;"></div>
                            </div>
                            <span style="font-size: 12px;">${item.completionRate}</span>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function renderDownstreamTable() {
            const tbody = document.getElementById('downstream-table-body');
            tbody.innerHTML = '';
            downstreamData.forEach(item => {
                const unitKey = unitMap[item.unitName] || item.unitName;
                const translatedUnit = getTrans(unitKey, item.unitName);

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${translatedUnit}</td>
                    <td>${item.tasksCount}</td>
                    <td>${item.completedCount}</td>
                    <td>
                         <div style="display: flex; align-items: center; gap: 8px;">
                            <div style="flex: 1; height: 6px; background: #e2e8f0; border-radius: 3px; width: 60px;">
                                <div style="width: ${item.completionRate}; height: 100%; background: #10b981; border-radius: 3px;"></div>
                            </div>
                            <span style="font-size: 12px;">${item.completionRate}</span>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Search Logic
        const searchWrapper = document.getElementById('search-wrapper');
        const searchInput = document.getElementById('search-input');
        const searchToggle = document.getElementById('search-toggle');
        const searchClose = document.getElementById('search-close');

        searchToggle.addEventListener('click', () => {
            searchWrapper.classList.add('active');
            searchInput.focus();
        });

        searchClose.addEventListener('click', () => {
            searchWrapper.classList.remove('active');
            searchInput.value = '';
            filteredMembers = [...teamMembers];
            currentPage = 1;
            renderTable();
        });

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            filteredMembers = teamMembers.filter(member => 
                member.name.toLowerCase().includes(query) || 
                member.level.toLowerCase().includes(query)
            );
            currentPage = 1; // Reset to first page on search
            renderTable();
        });

        // Initialize
        renderTable();
        renderUpstreamTable();
        renderDownstreamTable();

        // Language Switcher Logic
        const langSelect = document.getElementById('lang-switcher');
        if (langSelect) {
            langSelect.value = localStorage.getItem('app_language') || 'zh';
            langSelect.addEventListener('change', (e) => {
                if (window.i18nManager) {
                    window.i18nManager.setLanguage(e.target.value);
                }
            });
        }

        // Listen for language changes to re-render tables
        window.addEventListener('languageChanged', () => {
            renderTable();
            renderUpstreamTable();
            renderDownstreamTable();
        });

        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const root = document.documentElement;
        
        // Check local storage or system preference
        const savedTheme = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && systemDark)) {
            root.setAttribute('data-theme', 'dark');
        }

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = root.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            root.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            // Optional: Animate icon rotation
            const svg = themeToggleBtn.querySelector('svg');
            svg.style.transform = 'rotate(360deg)';
            svg.style.transition = 'transform 0.5s ease';
            setTimeout(() => {
                svg.style.transform = 'none';
                svg.style.transition = 'none';
            }, 500);
        });
    </script>
    <script src="i18n.js"></script>
</body>
</html>
